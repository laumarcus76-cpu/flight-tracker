# Flight Price Tracker — Configuration
# Copy this file to config.yaml and edit as needed.
# config.yaml is gitignored — never commit it if it contains personal data.

routes:
  - origin: SFO          # IATA airport code for departure
    destination: LAS     # IATA airport code for arrival
  - origin: OAK          # Oakland International Airport
    destination: LAS
  # Add more routes as needed

price_threshold: 150     # Max round-trip price in USD to include in digest

min_price_sanity: 10     # Ignore prices below this value (likely bad data)

scan_months_ahead: 3     # How many months ahead from today to scan
                         # Keep at 3 to stay within SerpAPI 250/month free tier

trip_patterns:           # Weekday pairs to check for each route
  - [Friday, Sunday]     # Weekend trip (2 nights)
  - [Thursday, Monday]   # Long weekend (4 nights)
